<main>
{% block content %}

{% endblock %}

<script>
        // Micro-interactions for header on scroll
        const header = document.querySelector('header');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 20) {
                header.classList.add('bg-surface-container-lowest', 'shadow-xl');
                header.classList.remove('bg-background');
            } else {
                header.classList.remove('bg-surface-container-lowest', 'shadow-xl');
                header.classList.add('bg-background');
            }
        });

        // Console easter egg for developers
        console.log("%c DocMakerAI %c Developer Console Active ", 
            "background: #00f2ff; color: #0d0d0d; font-weight: bold; padding: 4px 8px; border-radius: 2px;", 
            "background: #1a1a1a; color: #00f2ff; padding: 4px 8px; border-radius: 2px;");
    </script>
